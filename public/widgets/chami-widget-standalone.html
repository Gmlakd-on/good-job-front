<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>참이 돌봄 게임</title>
<style>
  :root{
    color-scheme: light;
    --ink:#5a4633;
    --muted:#9b826a;
    --card:#fffaf3;
    --cream:#fff4e6;
    --coral:#ff8095;
    --orange:#ff9f43;
    --mint:#3fbfa8;
    --purple:#9b86ee;
    --shadow:0 26px 62px -24px rgba(120,80,45,.46);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;min-height:100%;overflow:hidden;background:transparent}
  body{font-family:ui-rounded,"Apple SD Gothic Neo","Malgun Gothic",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);user-select:none}
  button{font:inherit;border:0;background:none;color:inherit;padding:0;cursor:pointer}
  .wrap{width:100%;height:100dvh;min-height:520px;display:flex;align-items:center;justify-content:center;padding:10px;background:radial-gradient(120% 100% at 50% 0%,#efe4d2 0%,#e4d4bd 100%)}
  .widget{position:relative;width:min(100%,420px);height:100%;max-height:880px;min-height:500px;border-radius:34px;overflow:hidden;background:linear-gradient(180deg,#fff7ec 0%,#ffeede 60%,#ffe4cf 100%);box-shadow:var(--shadow),0 0 0 1px rgba(255,255,255,.68) inset;display:flex;flex-direction:column}
  .top{position:relative;z-index:8;display:flex;align-items:flex-start;justify-content:space-between;gap:14px;padding:17px 19px 9px}
  .name-row{display:flex;align-items:center;gap:8px;min-width:0}.name{font-weight:950;font-size:23px;line-height:1;letter-spacing:-.02em;white-space:nowrap}.edit{width:21px;height:21px;border-radius:50%;background:#fff;box-shadow:0 3px 9px -4px rgba(90,60,30,.55);display:inline-grid;place-items:center;font-size:11px;color:#9b826a}.level{font-size:12px;font-weight:950;color:#fff;background:var(--orange);padding:4px 9px;border-radius:999px;box-shadow:0 5px 12px -6px rgba(255,159,67,.9)}
  .xp-row{display:flex;align-items:center;gap:7px;margin-top:7px}.xp-track{width:112px;height:8px;border-radius:999px;background:#f1e2cf;overflow:hidden}.xp-fill{height:100%;width:0;border-radius:999px;background:linear-gradient(90deg,#ffd06b,var(--orange));transition:width .35s ease}.xp-label{font-size:10px;font-weight:900;color:#b09a82}.heart-pill{display:flex;align-items:center;gap:7px;background:#fff;padding:8px 14px 8px 12px;border-radius:24px;box-shadow:0 6px 16px -8px rgba(255,120,140,.55);font-weight:950;font-size:17px}.heart{width:18px;height:16px;background:var(--coral);clip-path:polygon(50% 100%,12% 58%,0 28%,10% 8%,33% 8%,50% 26%,67% 8%,90% 8%,100% 28%,88% 58%)}
  .stage{position:relative;flex:1;min-height:0;margin:0 12px 4px;border-radius:28px;overflow:hidden;background:#ffe9d4 url("assets/c0.png") center 60%/cover no-repeat;box-shadow:0 8px 22px -14px rgba(140,100,60,.52) inset}.stage::after{content:"";position:absolute;left:50%;top:74%;width:170px;height:30px;border-radius:50%;transform:translateX(-50%);background:rgba(150,110,65,.18);filter:blur(3px);z-index:1}.speech{position:absolute;left:50%;top:7%;z-index:7;transform:translateX(-50%);max-width:86%;padding:9px 15px;border-radius:18px;background:#fff;box-shadow:0 9px 20px -10px rgba(150,110,70,.55);font-weight:950;font-size:15px;line-height:1.2;white-space:nowrap;animation:fadeIn .2s ease}.speech::after{content:"";position:absolute;left:50%;bottom:-5px;width:12px;height:12px;background:#fff;border-radius:2px;transform:translateX(-50%) rotate(45deg)}
  .char-box{position:absolute;left:50%;top:47%;z-index:3;width:64%;max-width:280px;aspect-ratio:1/1;transform:translate(-50%,-50%);cursor:pointer;touch-action:manipulation}.char-bob{width:100%;height:100%;animation:bob 3.6s ease-in-out infinite}.char{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 12px 14px rgba(150,110,65,.18));transform-origin:50% 72%;animation:breathe 3.4s ease-in-out infinite;-webkit-user-drag:none;pointer-events:none}.char.pop{animation:pop .34s ease}
  .sleep-layer{position:absolute;inset:0;z-index:6;background:linear-gradient(180deg,rgba(43,36,68,.25),rgba(43,36,68,.42));pointer-events:none;opacity:0;transition:opacity .25s ease}.sleep-layer.show{opacity:1}.moon{position:absolute;right:44px;top:48px;width:52px;height:52px;border-radius:50%;background:#fff2a6;box-shadow:0 0 26px rgba(255,242,166,.72)}.moon::after{content:"";position:absolute;right:-8px;top:-2px;width:50px;height:50px;border-radius:50%;background:#7e7190}.zzz{position:absolute;right:74px;top:112px;color:#fff;font-weight:950;font-size:22px;letter-spacing:4px;animation:floatZ 1.8s ease-in-out infinite}
  .particles{position:absolute;inset:0;z-index:6;pointer-events:none}.particle{position:absolute;font-size:22px;animation:floatUp 1.18s ease-out forwards;filter:drop-shadow(0 2px 5px rgba(160,90,70,.25))}.particle.spark{color:#ffd45e}.particle.heart{width:auto;height:auto;background:transparent;clip-path:none;color:var(--coral)}.particle.bubble{color:#7fd1ea;font-size:18px}
  .wash{position:absolute;inset:0;z-index:9;background:linear-gradient(180deg,rgba(190,235,248,.34),rgba(135,211,236,.34));display:none}.wash.show{display:block}.wash-water{position:absolute;inset:0;pointer-events:none}.stream{position:absolute;top:4%;width:3px;height:34px;border-radius:3px;background:linear-gradient(180deg,rgba(150,210,240,0),rgba(110,190,232,.9));animation:waterFall .72s linear infinite}.wash-hud{position:absolute;left:50%;top:9%;transform:translateX(-50%);z-index:3;width:72%;max-width:250px;text-align:center;pointer-events:none}.wash-title{display:inline-block;margin-bottom:6px;padding:6px 14px;border-radius:15px;background:rgba(255,255,255,.86);box-shadow:0 5px 12px -7px rgba(90,140,170,.55);font-size:14px;font-weight:950;color:#3f6f86}.wash-track{height:8px;border-radius:999px;background:rgba(255,255,255,.55);overflow:hidden}.wash-fill{height:100%;width:0;border-radius:999px;background:linear-gradient(90deg,#7fd1ea,#46b3da);transition:width .1s linear}.scrub-area{position:absolute;inset:0;z-index:2;cursor:grab;touch-action:none}.foam{position:absolute;z-index:3;width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.86);box-shadow:11px -4px 0 -3px rgba(255,255,255,.76),-8px 5px 0 -5px rgba(255,255,255,.8);animation:foam .7s ease-out forwards;pointer-events:none}.close-small{position:absolute;right:12px;top:10px;z-index:5;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.9);box-shadow:0 4px 10px -5px rgba(80,110,130,.7);display:grid;place-items:center;color:#6c818d;font-weight:950}
  .stats{position:relative;z-index:8;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;padding:8px 22px 4px}.stat span{display:block;margin-bottom:5px;font-size:11px;font-weight:850;color:#8a7560}.bar{height:9px;border-radius:999px;overflow:hidden;background:#eee}.bar-fill{height:100%;border-radius:999px;transition:width .45s ease}.bar-fill.low{animation:lowPulse .8s ease-in-out infinite}.hunger .bar{background:#ffe7cc}.hunger .bar-fill{background:#ff9f43}.happy .bar{background:#ffe0e9}.happy .bar-fill{background:#ff7aa0}.energy .bar{background:#e7e0fb}.energy .bar-fill{background:#9b86ee}.clean .bar{background:#d6f0eb}.clean .bar-fill{background:#3fbfa8}
  .actions{position:relative;z-index:8;display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;padding:10px 16px 18px}.action{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:0;border-radius:16px;transition:transform .15s ease,opacity .2s ease}.action:active{transform:translateY(2px) scale(.98)}.action img{width:58px;height:58px;object-fit:contain;filter:drop-shadow(0 6px 12px rgba(120,80,45,.16));-webkit-user-drag:none}.action span{font-size:12px;font-weight:950;color:#7a6450;white-space:nowrap}.widget.busy .action:not(.sleep-action),.widget.sleeping .action:not(.sleep-action){opacity:.42}
  .modal{position:absolute;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;padding:16px;background:rgba(60,45,30,.5)}.hidden{display:none!important}.game-card{width:100%;max-width:352px;border-radius:27px;background:#fffaf3;padding:18px;box-shadow:0 26px 60px -17px rgba(90,60,30,.6);animation:popIn .18s ease}.game-title{text-align:center;font-size:20px;font-weight:950;margin:2px 0 5px}.game-sub{text-align:center;font-size:12px;font-weight:850;color:#a8917a;margin-bottom:16px}.choice{width:100%;display:flex;align-items:center;gap:14px;padding:14px;border-radius:20px;border:2px solid #ffe2bc;background:#fff4e0;text-align:left;margin-bottom:12px}.choice:nth-of-type(2){background:#eef5f3;border-color:#d3e8e2}.choice-icon{width:52px;height:52px;flex:none;border-radius:16px;background:linear-gradient(160deg,#ffd06b,#ff9f43);display:grid;place-items:center;font-size:28px}.choice:nth-of-type(2) .choice-icon{background:linear-gradient(160deg,#9fd8ec,#5cb6d8)}.choice strong{display:block;font-size:16px;font-weight:950}.choice small{display:block;margin-top:4px;color:#9b826a;font-size:12px;font-weight:750}.game-close{display:block;margin:14px auto 0;color:#aa9885;font-size:13px;font-weight:900}.game-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}.pill{display:inline-flex;align-items:center;gap:6px;background:#fff0e0;padding:7px 12px;border-radius:16px;font-size:16px;font-weight:950}.lives{display:flex;gap:3px}.life{width:16px;height:14px;background:#ff6f91;clip-path:polygon(50% 100%,12% 58%,0 28%,10% 8%,33% 8%,50% 26%,67% 8%,90% 8%,100% 28%,88% 58%)}.life.empty{background:#ecdcc9}.catch-board{position:relative;height:360px;border-radius:22px;overflow:hidden;background:linear-gradient(180deg,#e8f8ff 0%,#fff6df 100%);box-shadow:inset 0 0 0 2px rgba(255,255,255,.72);touch-action:none}.catch-items{position:absolute;inset:0;pointer-events:none}.snack{position:absolute;width:34px;height:34px;margin-left:-17px;margin-top:-17px;display:grid;place-items:center;font-size:27px;filter:drop-shadow(0 4px 6px rgba(110,80,40,.18))}.basket{position:absolute;bottom:16px;left:50%;width:82px;height:52px;margin-left:-41px;transition:left .05s linear;filter:drop-shadow(0 7px 10px rgba(100,60,30,.25))}.basket::before{content:"";position:absolute;left:8px;right:8px;top:-8px;height:16px;border-radius:15px;background:linear-gradient(180deg,#c98a52,#a96e3a)}.basket::after{content:"";position:absolute;inset:5px 0 0;background:linear-gradient(180deg,#e0a866,#b9793f);border-radius:7px 7px 17px 17px;clip-path:polygon(4% 0,96% 0,86% 100%,14% 100%)}.catch-msg{position:absolute;left:50%;top:45%;transform:translate(-50%,-50%);font-weight:950;font-size:28px;color:#ff8095;text-shadow:0 2px 0 #fff;pointer-events:none}.window-pane{position:relative;height:360px;border-radius:22px;overflow:hidden;background:center/cover no-repeat;box-shadow:inset 0 0 0 3px rgba(255,255,255,.75);touch-action:none}.window-fog{position:absolute;inset:0;background:rgba(232,238,235,.92);backdrop-filter:blur(7px);transition:opacity .12s linear}.window-shine{position:absolute;inset:0;background:linear-gradient(115deg,transparent 0 35%,rgba(255,255,255,.5) 35% 40%,transparent 40% 100%);opacity:.8;pointer-events:none}.progress-track{height:8px;border-radius:999px;background:#e7f2ef;overflow:hidden;margin:11px 2px 0}.progress-fill{height:100%;width:0;background:linear-gradient(90deg,#7fd1ea,#46b3da);border-radius:999px}.result{text-align:center;padding:8px 2px 3px}.result-icon{font-size:48px}.result strong{display:block;font-size:20px;font-weight:950;margin:8px 0 5px}.result p{font-size:13px;font-weight:850;color:#927b63;margin:0 0 15px}.primary{width:100%;height:46px;border-radius:16px;background:linear-gradient(135deg,#ffb36a,#ff8095);color:#fff;font-weight:950;box-shadow:0 8px 18px -10px rgba(255,128,149,.9)}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.025,.975)}}@keyframes pop{0%{transform:scale(1)}30%{transform:scale(1.13,.87)}60%{transform:scale(.94,1.06)}100%{transform:scale(1)}}@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes floatUp{0%{transform:translate(0,0) scale(.45);opacity:0}18%{opacity:1}100%{transform:translate(var(--dx,0),-132px) scale(1.24);opacity:0}}@keyframes lowPulse{0%,100%{opacity:1}50%{opacity:.42}}@keyframes popIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}@keyframes waterFall{from{transform:translateY(-42px)}to{transform:translateY(360px)}}@keyframes foam{0%{transform:scale(.55);opacity:.75}100%{transform:scale(1.5);opacity:0}}@keyframes floatZ{0%,100%{transform:translateY(0);opacity:.7}50%{transform:translateY(-8px);opacity:1}}
  @media (max-width:380px){.wrap{padding:0}.widget{border-radius:0;max-height:none}.top{padding-left:15px;padding-right:15px}.actions{gap:4px;padding-left:10px;padding-right:10px}.action img{width:52px;height:52px}.stats{gap:7px;padding-left:16px;padding-right:16px}.stage{margin-left:8px;margin-right:8px;border-radius:24px}.catch-board,.window-pane{height:330px}}
</style>
</head>
<body>
<div class="wrap">
  <main class="widget" id="widget" aria-label="참이 돌봄 게임">
    <header class="top">
      <div>
        <div class="name-row">
          <button class="name" id="name" type="button" title="이름 바꾸기">참이</button>
          <button class="edit" id="rename" type="button" aria-label="이름 바꾸기">✎</button>
          <span class="level">Lv.<span id="level">1</span></span>
        </div>
        <div class="xp-row"><div class="xp-track"><div class="xp-fill" id="xpFill"></div></div><span class="xp-label">EXP</span></div>
      </div>
      <div class="heart-pill"><div class="heart" aria-hidden="true"></div><span id="hearts">12</span></div>
    </header>

    <section class="stage" id="stage" aria-label="참이 방">
      <div class="speech" id="speech">오늘도 같이 놀자!</div>
      <div class="particles" id="particles"></div>
      <div class="sleep-layer" id="sleepLayer"><div class="moon"></div><div class="zzz">Zzz</div></div>
      <div class="char-box" id="pet"><div class="char-bob"><img class="char" id="char" src="assets/s2.png" alt="참이" draggable="false" /></div></div>
      <div class="wash" id="wash">
        <div class="wash-water" id="washWater"></div>
        <div class="wash-hud"><div class="wash-title" id="washText">문질러 주세요</div><div class="wash-track"><div class="wash-fill" id="washFill"></div></div></div>
        <div class="scrub-area" id="scrubArea"></div>
        <button class="close-small" id="cancelWash" type="button" aria-label="씻기기 닫기">×</button>
      </div>
    </section>

    <section class="stats" aria-label="참이 상태">
      <div class="stat hunger"><span>배고픔</span><div class="bar"><div class="bar-fill" id="hungerFill"></div></div></div>
      <div class="stat happy"><span>행복</span><div class="bar"><div class="bar-fill" id="happyFill"></div></div></div>
      <div class="stat energy"><span>에너지</span><div class="bar"><div class="bar-fill" id="energyFill"></div></div></div>
      <div class="stat clean"><span>청결</span><div class="bar"><div class="bar-fill" id="cleanFill"></div></div></div>
    </section>

    <nav class="actions" aria-label="돌봄 행동">
      <button class="action" id="feed" type="button"><img src="assets/btn-feed.png" alt="" /><span>밥주기</span></button>
      <button class="action" id="play" type="button"><img src="assets/btn-play.png" alt="" /><span>놀아주기</span></button>
      <button class="action sleep-action" id="sleep" type="button"><img src="assets/btn-sleep.png" alt="" /><span id="sleepLabel">재우기</span></button>
      <button class="action" id="washBtn" type="button"><img src="assets/btn-wash.png" alt="" /><span>씻기기</span></button>
      <button class="action" id="gameBtn" type="button"><img src="assets/btn-game.png" alt="" /><span>게임</span></button>
    </nav>

    <div class="modal hidden" id="modal"><div class="game-card" id="gameCard"></div></div>
  </main>
</div>
<script>
(function(){
  "use strict";
  var STORE = "chami-care-standalone-v1";
  var defaults = { name:"참이", level:1, xp:0, hearts:12, hunger:72, happy:76, energy:82, clean:78, sleeping:false };
  var state = loadState();
  var timers = { speech:0, reaction:0, pop:0, catchRaf:0 };
  var reactionImg = "";
  var washing = false;
  var washProgress = 0;
  var gameOpen = false;
  var catchGame = null;

  var el = {
    widget: byId("widget"), name: byId("name"), rename: byId("rename"), level: byId("level"), xpFill: byId("xpFill"), hearts: byId("hearts"),
    speech: byId("speech"), particles: byId("particles"), char: byId("char"), pet: byId("pet"), sleepLayer: byId("sleepLayer"),
    hungerFill: byId("hungerFill"), happyFill: byId("happyFill"), energyFill: byId("energyFill"), cleanFill: byId("cleanFill"),
    feed: byId("feed"), play: byId("play"), sleep: byId("sleep"), sleepLabel: byId("sleepLabel"), washBtn: byId("washBtn"), gameBtn: byId("gameBtn"),
    wash: byId("wash"), washWater: byId("washWater"), washText: byId("washText"), washFill: byId("washFill"), scrubArea: byId("scrubArea"), cancelWash: byId("cancelWash"),
    stage: byId("stage"), modal: byId("modal"), gameCard: byId("gameCard")
  };

  function byId(id){ return document.getElementById(id); }
  function clamp(n){ return Math.max(0, Math.min(100, Number(n) || 0)); }
  function rand(min,max){ return min + Math.random() * (max-min); }
  function choice(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
  function loadState(){
    try { return Object.assign({}, defaults, JSON.parse(localStorage.getItem(STORE) || "{}")); }
    catch(e){ return Object.assign({}, defaults); }
  }
  function save(){ try { localStorage.setItem(STORE, JSON.stringify(state)); } catch(e){} }
  function updateStats(diff){
    ["hunger","happy","energy","clean"].forEach(function(k){ if(Object.prototype.hasOwnProperty.call(diff,k)) state[k] = clamp(state[k] + diff[k]); });
    save(); render();
  }
  function gain(xp, hearts){
    state.xp += xp || 0;
    state.hearts = Math.max(0, state.hearts + (hearts || 0));
    while(state.xp >= 100){ state.xp -= 100; state.level += 1; state.hearts += 5; setSpeech("레벨 업! 참이가 더 반짝여요 ✨", 2400); spawn("spark", 12); }
    save(); render();
  }
  function setSpeech(text, ms){
    el.speech.textContent = text;
    clearTimeout(timers.speech);
    timers.speech = setTimeout(function(){ el.speech.textContent = idleSpeech(); }, ms || 2200);
  }
  function idleSpeech(){
    if(state.sleeping) return "새근새근 꿈꾸는 중...";
    if(state.hunger < 35) return "배가 조금 고파요";
    if(state.clean < 35) return "뽀득뽀득 씻고 싶어요";
    if(state.energy < 35) return "조금 졸려요";
    if(state.happy < 35) return "같이 놀아줘요";
    return choice(["오늘도 같이 놀자!","참이가 기다렸어요","눌러주면 기분이 좋아져요","반짝반짝 좋은 하루!"]);
  }
  function setReaction(src, ms){
    reactionImg = src;
    clearTimeout(timers.reaction);
    timers.reaction = setTimeout(function(){ reactionImg = ""; render(); }, ms || 1800);
    render();
  }
  function popChar(){
    el.char.classList.remove("pop");
    void el.char.offsetWidth;
    el.char.classList.add("pop");
    clearTimeout(timers.pop);
    timers.pop = setTimeout(function(){ el.char.classList.remove("pop"); }, 360);
  }
  function moodImage(){
    if(state.sleeping) return "assets/s7.png";
    if(reactionImg) return reactionImg;
    if(state.clean < 35) return "assets/s8.png";
    if(state.energy < 35) return "assets/s6.png";
    if(state.hunger < 35) return "assets/s1.png";
    if(state.happy > 88) return "assets/s5.png";
    return state.happy > 60 ? "assets/s2.png" : "assets/s4.png";
  }
  function render(){
    state.hunger = clamp(state.hunger); state.happy = clamp(state.happy); state.energy = clamp(state.energy); state.clean = clamp(state.clean);
    el.name.textContent = state.name || "참이";
    el.level.textContent = state.level;
    el.hearts.textContent = state.hearts;
    el.xpFill.style.width = state.xp + "%";
    setBar(el.hungerFill, state.hunger); setBar(el.happyFill, state.happy); setBar(el.energyFill, state.energy); setBar(el.cleanFill, state.clean);
    el.char.src = moodImage();
    el.sleepLabel.textContent = state.sleeping ? "깨우기" : "재우기";
    el.sleepLayer.classList.toggle("show", state.sleeping);
    el.widget.classList.toggle("sleeping", state.sleeping);
    el.widget.classList.toggle("busy", washing || gameOpen);
    el.wash.classList.toggle("show", washing);
    el.washFill.style.width = washProgress + "%";
    el.washText.textContent = washProgress >= 100 ? "깨끗해졌어요!" : "문질러 씻겨주세요 " + washProgress + "%";
  }
  function setBar(node, value){ node.style.width = value + "%"; node.classList.toggle("low", value < 30); }
  function spawn(type, count){
    for(var i=0;i<count;i+=1){
      var p = document.createElement("div");
      p.className = "particle " + type;
      p.textContent = type === "spark" ? "✦" : type === "bubble" ? "●" : "♥";
      p.style.left = rand(30,70) + "%";
      p.style.top = rand(36,68) + "%";
      p.style.setProperty("--dx", rand(-60,60) + "px");
      p.style.animationDelay = rand(0,.16) + "s";
      el.particles.appendChild(p);
      setTimeout(function(node){ if(node && node.parentNode) node.parentNode.removeChild(node); }, 1300, p);
    }
  }
  function canAct(){
    if(gameOpen || washing){ return false; }
    if(state.sleeping){ setSpeech("참이가 자는 중이에요. 먼저 깨워주세요", 1600); return false; }
    return true;
  }
  function feed(){ if(!canAct()) return; updateStats({hunger:24,happy:5,energy:2,clean:-2}); gain(8,2); setSpeech("냠냠! 맛있어요",1900); setReaction("assets/s3.png",1900); spawn("heart",5); popChar(); }
  function play(){ if(!canAct()) return; updateStats({happy:24,energy:-8,hunger:-4,clean:-2}); gain(10,3); setSpeech("꺄르륵! 더 놀자",1900); setReaction("assets/s5.png",1900); spawn("spark",7); popChar(); }
  function pet(){ if(washing || gameOpen) return; if(state.sleeping){ setSpeech("새근새근...",1200); return; } updateStats({happy:3}); gain(2,1); setSpeech(choice(["쓰담쓰담 좋아요","헤헤, 고마워요","참이 기분 최고!"]),1300); setReaction("assets/s4.png",1200); spawn("heart",3); popChar(); }
  function toggleSleep(){
    if(washing || gameOpen) return;
    state.sleeping = !state.sleeping;
    if(state.sleeping){ setSpeech("참이가 잠들었어요",1700); }
    else { updateStats({energy:10,happy:3}); gain(5,1); setSpeech("잘 잤다!",1700); setReaction("assets/s2.png",1600); spawn("spark",5); }
    save(); render();
  }
  function startWash(){
    if(!canAct()) return;
    washing = true; washProgress = 0;
    el.washWater.innerHTML = "";
    for(var i=0;i<10;i+=1){ var s=document.createElement("div"); s.className="stream"; s.style.left=(14+i*8)+"%"; s.style.animationDelay=(i*.07)+"s"; el.washWater.appendChild(s); }
    setSpeech("슥슥 문질러 씻겨주세요",1800);
    render();
  }
  function finishWash(){
    washing = false; washProgress = 100;
    updateStats({clean:100-state.clean,happy:8,energy:-2});
    gain(12,3); setSpeech("뽀득뽀득 깨끗해졌어요!",2200); setReaction("assets/s5.png",2100); spawn("bubble",10); spawn("spark",6); popChar();
  }
  function scrub(e){
    if(!washing) return;
    e.preventDefault();
    washProgress = Math.min(100, washProgress + (e.type === "pointerdown" ? 12 : 5));
    var box = el.stage.getBoundingClientRect();
    var foam = document.createElement("div"); foam.className = "foam";
    foam.style.left = (e.clientX - box.left - 11) + "px"; foam.style.top = (e.clientY - box.top - 11) + "px"; el.wash.appendChild(foam);
    setTimeout(function(){ if(foam.parentNode) foam.parentNode.removeChild(foam); }, 720);
    render();
    if(washProgress >= 100 && washing){ washing = false; render(); setTimeout(finishWash, 80); }
  }
  function cancelWash(){ washing = false; washProgress = 0; setSpeech("씻기기를 멈췄어요",1400); render(); }
  function rename(){
    var next = prompt("참이 이름을 정해주세요", state.name || "참이");
    if(next && next.trim()){ state.name = next.trim().slice(0,10); save(); render(); setSpeech(state.name + "라고 불러주세요!", 1800); }
  }

  function openGame(){ if(!canAct()) return; gameOpen = true; render(); el.modal.classList.remove("hidden"); showPicker(); }
  function closeGame(){ stopCatch(); gameOpen = false; el.modal.classList.add("hidden"); el.gameCard.innerHTML = ""; render(); }
  function showPicker(){
    el.gameCard.innerHTML = '<div class="game-title">미니게임</div><div class="game-sub">참이와 바로 놀 수 있어요</div>' +
      '<button class="choice" id="pickCatch" type="button"><span class="choice-icon">⭐</span><span><strong>간식 받기</strong><small>바구니로 떨어지는 간식을 받아요</small></span></button>' +
      '<button class="choice" id="pickWindow" type="button"><span class="choice-icon">🪟</span><span><strong>창문 닦기</strong><small>뿌연 창을 문질러 풍경을 열어요</small></span></button>' +
      '<button class="game-close" id="gameClose" type="button">닫기</button>';
    byId("pickCatch").addEventListener("click", showCatchGame);
    byId("pickWindow").addEventListener("click", showWindowGame);
    byId("gameClose").addEventListener("click", closeGame);
  }
  function showCatchGame(){
    stopCatch();
    catchGame = { score:0, lives:3, basket:50, items:[], last:performance.now(), spawnAt:0, started:performance.now(), msg:"" };
    el.gameCard.innerHTML = '<div class="game-top"><div class="pill">⭐ <span id="catchScore">0</span></div><div style="text-align:center;font-weight:950">간식 받기<br><small id="catchTime" style="color:#b7a18b">30초</small></div><div class="lives" id="catchLives"></div></div>' +
      '<div class="catch-board" id="catchBoard"><div class="catch-items" id="catchItems"></div><div class="basket" id="basket"></div><div class="catch-msg" id="catchMsg"></div></div>' +
      '<button class="game-close" id="catchQuit" type="button">그만하기</button>';
    var board = byId("catchBoard");
    board.addEventListener("pointermove", moveBasket); board.addEventListener("pointerdown", moveBasket);
    byId("catchQuit").addEventListener("click", showPicker);
    catchGame.raf = requestAnimationFrame(catchLoop);
  }
  function moveBasket(e){
    if(!catchGame) return;
    var box = byId("catchBoard").getBoundingClientRect();
    catchGame.basket = Math.max(8, Math.min(92, ((e.clientX - box.left) / box.width) * 100));
  }
  function catchLoop(now){
    if(!catchGame) return;
    var board = byId("catchBoard"); if(!board) return;
    var dt = Math.min(48, now - catchGame.last); catchGame.last = now;
    catchGame.spawnAt -= dt;
    if(catchGame.spawnAt <= 0){
      catchGame.items.push({ id:Math.random().toString(36).slice(2), x:rand(10,90), y:-22, speed:rand(.13,.22), kind:Math.random()<.13 ? "bomb" : choice(["star","cookie","berry"]) });
      catchGame.spawnAt = rand(420,760);
    }
    var h = board.clientHeight || 350;
    catchGame.items = catchGame.items.filter(function(item){
      item.y += item.speed * dt;
      if(item.y > h - 62){
        var caught = Math.abs(item.x - catchGame.basket) < 14;
        if(caught && item.kind === "bomb"){ catchGame.lives -= 1; flashCatch("앗!"); }
        else if(caught){ catchGame.score += 1; flashCatch("+1"); }
        else if(item.kind !== "bomb"){ catchGame.lives -= 1; flashCatch("놓쳤다!"); }
        return false;
      }
      return item.y < h + 50;
    });
    var leftMs = Math.max(0, 30000 - (now - catchGame.started));
    renderCatch(leftMs);
    if(catchGame.lives <= 0 || leftMs <= 0){ endCatch(); return; }
    catchGame.raf = requestAnimationFrame(catchLoop);
  }
  function renderCatch(leftMs){
    if(!catchGame) return;
    var items = byId("catchItems"); var basket = byId("basket");
    if(!items || !basket) return;
    byId("catchScore").textContent = catchGame.score;
    byId("catchTime").textContent = Math.ceil(leftMs/1000) + "초";
    byId("catchLives").innerHTML = [0,1,2].map(function(i){ return '<span class="life '+(i>=catchGame.lives?'empty':'')+'"></span>'; }).join("");
    basket.style.left = catchGame.basket + "%";
    items.innerHTML = catchGame.items.map(function(it){ return '<div class="snack" style="left:'+it.x+'%;top:'+it.y+'px">'+ snackIcon(it.kind) +'</div>'; }).join("");
  }
  function snackIcon(kind){ return kind === "bomb" ? "💣" : kind === "cookie" ? "🍪" : kind === "berry" ? "🫐" : "⭐"; }
  function flashCatch(text){ var msg = byId("catchMsg"); if(!msg) return; msg.textContent = text; clearTimeout(msg._t); msg._t = setTimeout(function(){ msg.textContent=""; }, 420); }
  function stopCatch(){ if(catchGame && catchGame.raf) cancelAnimationFrame(catchGame.raf); catchGame = null; }
  function endCatch(){
    var score = catchGame ? catchGame.score : 0;
    stopCatch();
    var bonus = Math.max(1, Math.min(20, score));
    if(score > 0){ updateStats({happy:Math.min(18, score*2), energy:-4, hunger:-3}); gain(bonus*2, bonus); setReaction("assets/s5.png",1700); spawn("heart", Math.min(12, score)); }
    el.gameCard.innerHTML = '<div class="result"><div class="result-icon">⭐</div><strong>'+score+'개 받았어요!</strong><p>참이가 신나게 웃고 있어요.</p><button class="primary" id="resultOk" type="button">돌아가기</button></div>';
    byId("resultOk").addEventListener("click", closeGame);
  }
  function showWindowGame(){
    stopCatch();
    var progress = 0; var done = false; var img = "assets/win" + Math.floor(rand(1,6)) + ".jpg";
    el.gameCard.innerHTML = '<div class="game-top"><div class="pill">🪟</div><div style="font-weight:950">창문 닦기</div><button class="game-close" id="windowQuit" type="button" style="margin:0">닫기</button></div>' +
      '<div class="window-pane" id="windowPane"><div class="window-fog" id="windowFog"></div><div class="window-shine"></div></div><div class="progress-track"><div class="progress-fill" id="windowProgress"></div></div>';
    byId("windowPane").style.backgroundImage = 'url("' + img + '")';
    byId("windowQuit").addEventListener("click", showPicker);
    function rub(e){
      if(done) return; e.preventDefault();
      progress = Math.min(100, progress + (e.type === "pointerdown" ? 14 : 6));
      byId("windowFog").style.opacity = Math.max(0, .92 - progress/105);
      byId("windowProgress").style.width = progress + "%";
      if(progress >= 100){ done = true; setTimeout(function(){
        updateStats({happy:16, clean:8, energy:-3}); gain(16,5); setReaction("assets/s5.png",1800); spawn("spark",12);
        el.gameCard.innerHTML = '<div class="result"><div class="result-icon">🌈</div><strong>풍경이 열렸어요!</strong><p>창문이 반짝반짝해졌어요.</p><button class="primary" id="windowOk" type="button">돌아가기</button></div>';
        byId("windowOk").addEventListener("click", closeGame);
      }, 180); }
    }
    byId("windowPane").addEventListener("pointerdown", rub); byId("windowPane").addEventListener("pointermove", rub);
  }

  el.feed.addEventListener("click", feed); el.play.addEventListener("click", play); el.sleep.addEventListener("click", toggleSleep); el.washBtn.addEventListener("click", startWash); el.gameBtn.addEventListener("click", openGame); el.pet.addEventListener("pointerdown", pet);
  el.scrubArea.addEventListener("pointerdown", scrub); el.scrubArea.addEventListener("pointermove", scrub); el.cancelWash.addEventListener("click", cancelWash);
  el.name.addEventListener("click", rename); el.rename.addEventListener("click", rename);
  el.modal.addEventListener("click", function(e){ if(e.target === el.modal) closeGame(); });

  setInterval(function(){
    if(washing || gameOpen) return;
    if(state.sleeping) updateStats({energy:4,hunger:-1,happy:1,clean:-.5});
    else updateStats({hunger:-1,happy:-.6,energy:-.6,clean:-.5});
  }, 9000);
  setInterval(function(){ if(!washing && !gameOpen) el.speech.textContent = idleSpeech(); }, 6200);

  render(); el.speech.textContent = idleSpeech();
})();
</script>
</body>
</html>
